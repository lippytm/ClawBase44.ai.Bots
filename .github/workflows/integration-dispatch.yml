name: Integration Dispatch

on:
  # Triggered manually from the GitHub UI or via the API
  workflow_dispatch:
    inputs:
      service:
        description: "Target service (base44 | openai | grok | replit | web3 | github | all)"
        required: true
        default: "all"
      event:
        description: "Event name to broadcast"
        required: false
        default: "workflow_run"
      payload:
        description: "JSON payload (optional)"
        required: false
        default: "{}"
  # Triggered by a repository_dispatch event from external services
  repository_dispatch:
    types:
      - integration-trigger

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch integration event
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run integration dispatch
        env:
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
          BASE44_APP_ID: ${{ secrets.BASE44_APP_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHATGPT_ASSISTANT_ID: ${{ secrets.CHATGPT_ASSISTANT_ID }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          REPLIT_API_KEY: ${{ secrets.REPLIT_API_KEY }}
          REPLIT_REPL_ID: ${{ secrets.REPLIT_REPL_ID }}
          WEB3_RPC_URL: ${{ secrets.WEB3_RPC_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          SERVICE: ${{ github.event.inputs.service || github.event.client_payload.service || 'all' }}
          EVENT_NAME: ${{ github.event.inputs.event || github.event.client_payload.event || 'workflow_run' }}
          PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
        run: |
          node -e "
            const { createIntegrations } = require('./src/index');
            const integrations = createIntegrations({});
            const service = process.env.SERVICE;
            const eventName = process.env.EVENT_NAME;
            let payload;
            try { payload = JSON.parse(process.env.PAYLOAD); } catch { payload = {}; }
            console.log('Dispatching event:', eventName, 'to service:', service);
            const targets = service === 'all'
              ? ['base44', 'github', 'webhook']
              : [service];
            const jobs = [];
            if (targets.includes('base44') && process.env.BASE44_API_KEY) {
              jobs.push(integrations.base44.sendEvent(eventName, payload).catch(e => console.error('base44:', e.message)));
            }
            if (targets.includes('webhook') && process.env.WEBHOOK_SECRET) {
              jobs.push(integrations.webhook.broadcast(eventName, payload).catch(e => console.error('webhook:', e.message)));
            }
            Promise.all(jobs).then(() => console.log('Done'));
          "
