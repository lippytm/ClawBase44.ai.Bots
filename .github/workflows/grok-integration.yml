name: Grok (xAI) Integration

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "User message to send to Grok"
        required: true
      model:
        description: "Grok model to use (default: grok-3)"
        required: false
        default: "grok-3"
  repository_dispatch:
    types:
      - grok-trigger

permissions:
  contents: read

jobs:
  grok:
    name: Query Grok via xAI API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Call Grok API
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GROK_MODEL: ${{ github.event.inputs.model || github.event.client_payload.model || 'grok-3' }}
          PROMPT: ${{ github.event.inputs.prompt || github.event.client_payload.prompt }}
        run: |
          node -e "
            const { createIntegrations } = require('./src/index');
            const integrations = createIntegrations({});
            integrations.grok.chat(
              [{ role: 'user', content: process.env.PROMPT }],
              { model: process.env.GROK_MODEL }
            ).then(r => {
              console.log('Grok reply:', r.choices[0].message.content);
            }).catch(e => { console.error(e.message); process.exit(1); });
          "
